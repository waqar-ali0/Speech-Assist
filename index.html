      body {
        font-family: 'Inter', sans-serif;
        background-color: #F9FAFB;
      }
      /* Custom animation for the listening pulse */
      @keyframes pulse-ring {
        0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(13, 148, 136, 0.7); }
        70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(13, 148, 136, 0); }
        100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(13, 148, 136, 0); }
      }
      .listening-pulse {
        animation: pulse-ring 2s infinite;
      }
    </style>
